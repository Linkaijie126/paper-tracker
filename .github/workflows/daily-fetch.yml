name: Daily Paper Fetch

on:
  schedule:
    # 每天 UTC 00:00 = 北京时间 08:00 执行
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持在 GitHub 网页手动触发

permissions:
  contents: write # 允许提交回仓库

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch papers from arXiv
        run: python scripts/fetch_papers.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git commit -m "chore: daily paper fetch $(date -u +%Y-%m-%d)" || echo "No new papers today"
          git push
