name: Daily Paper Fetch

on:
  schedule:
    # UTC 02:30 = 北京时间 10:30（避开整点高峰，提高触发率）
    - cron: "30 2 * * *"
  workflow_dispatch: # 支持在 GitHub 网页手动触发

permissions:
  contents: write # 允许提交回仓库

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Fetch papers from arXiv
        run: python scripts/fetch_papers.py
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git commit -m "chore: daily paper fetch $(date -u +%Y-%m-%d)" || echo "No new papers today"
          # rebase 到远程最新；数据文件冲突时优先用刚生成的版本(-X theirs)
          # workflow 只修改 docs/data/，代码文件不会冲突
          git pull --rebase -X theirs origin main || git rebase --abort
          git push
