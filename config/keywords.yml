# ============================================
# 文献追踪关键词配置
# 修改后推送到 GitHub，下次定时任务自动生效
# ============================================

# 每个分类包含：名称、关键词列表、arXiv 分类过滤
# 关键词之间是 OR 关系（命中任一即收录）
# arXiv 分类参考：https://arxiv.org/category_taxonomy
#   cond-mat.mtrl-sci  凝聚态·材料科学
#   cond-mat.mes-hall   凝聚态·介观与霍尔效应
#   cond-mat.str-el     凝聚态·强关联电子
#   physics.chem-ph     物理·化学物理
#   physics.ins-det     物理·仪器与探测器
#   materials-science   材料科学（综合）

categories:
  - name: 离子插层
    keywords:
      # 单词/双词组合，命中率高
      - "ion intercalation"
      - "lithium intercalation"
      - "intercalated"
      - "ion insertion"
      - "electrochemical intercalation"
      - "graphite intercalation"
      - "stage transition"
      - "cation intercalation"
    arxiv_categories:
      - cond-mat.mtrl-sci
      - cond-mat.mes-hall
      - cond-mat.str-el
      - physics.chem-ph

  - name: 二维材料热导
    keywords:
      # 热导/热输运 + 2D/层状/vdW
      - "thermal conductivity layered"
      - "thermal transport layered"
      - "phonon transport"
      - "thermal conductivity van der Waals"
      - "thermoelectric van der Waals"
      - "thermal conductivity 2D"
      - "heat transport layered"
      - "intercalation thermal"
    arxiv_categories:
      - cond-mat.mtrl-sci
      - cond-mat.mes-hall

  - name: 材料制备
    keywords:
      # RGO/GO 薄膜制备
      - "reduced graphene oxide"
      - "graphene oxide film"
      - "spin coating"
      - "RGO thin film"
      - "graphene oxide fabrication"
      - "GO film"
      - "spin-coated"
    arxiv_categories:
      - cond-mat.mtrl-sci
      - physics.chem-ph
      - materials-science
      - cond-mat.mes-hall

  - name: 纳米力学
    keywords:
      - "van der Waals interlayer"
      - "interlayer coupling"
      - "interlayer interaction"
      - "2D material mechanical"
      - "nanomechanics"
      - "vdW interlayer"
      - "elastic properties layered"
      - "interlayer mechanics"
    arxiv_categories:
      - cond-mat.mtrl-sci
      - cond-mat.mes-hall

  - name: 原子力显微镜与表征
    keywords:
      - "atomic force microscopy"
      - "AFM nanoindentation"
      - "contact resonance"
      - "PeakForce QNM"
      - "conductive AFM"
      - "magnetic force microscopy"
      - "nanoscale characterization"
      - "AFM mechanical"
    arxiv_categories:
      - cond-mat.mtrl-sci
      - cond-mat.mes-hall
      - physics.ins-det
      - cond-mat.str-el

# 抓取设置
fetch:
  max_results_per_query: 50   # 每个分类最多抓取条数
  keep_history: 500           # 历史保留最大条数
  days_back: 14               # 仅抓取最近 N 天发布的文献（避免拉取历史文献）
  days_mark_new: 3            # 多少天内的文献标记为"新"
